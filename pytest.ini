[pytest]
# Skills are standalone; identically-named tests/ packages must not clash.
addopts = --import-mode=importlib -p no:cacheprovider
testpaths =
    .agents/skills/kb-lint/tests
    .agents/skills/kb-collect/tests
    .agents/skills/kb-ingest/tests
    .agents/skills/kb-graph/tests
    .agents/skills/kb-undo-ingest/tests
    .agents/skills/kb-query/tests
    .agents/skills/kb-link/tests
    .agents/skills/kb-rename/tests
    .agents/skills/kb-merge/tests
    .agents/skills/kb-archive/tests
    .agents/skills/kb-thread/tests
    .agents/skills/kb-status/tests
    .agents/skills/tests_common
